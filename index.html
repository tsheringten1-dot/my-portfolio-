<!DOCTYPE html>
<html lang="en" class="scroll-smooth">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title> Tshering T Shrp| Portfolio</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500&family=Poppins:wght@600;700&display=swap" rel="stylesheet">
    <style>
        :root{
            --primary: #0ea5e9;
            --secondary: #6366f1;
            --dark:#0f172a;
            --darker:#020617;
            --text-main: #f8fafc;
            --text-dim:#94a3b8;
            --transition: 0.3s ease;
            --font-heading:'Poppins',sans-serif;
            --font-body:'Inter',sans-serif;
        }
      *{
        margin:0;
        padding: 0;
        box-sizing: border-box;
      }
      /* Your original CSS remains unchanged */
      /* ... (All your original styles are kept exactly the same) ... */
    </style>
    <script src="https://unpkg.com/lucide@0.473.0/dist/umd/lucide.min.js"></script>
</head>
<body>
    <!-- Your entire original code until Contact Section remains the same -->

    <!-- ==================== CONTACT SECTION (Only this part is updated) ==================== -->
    <section class="section" id="contact">
      <div class="section-title">
        <h2>Get In <span style="color: var(--primary);">Touch</span></h2>
        <div class="underline"></div>
      </div>
      
      <div class="contact-container">
        <form id="contactForm" class="contact-form" action="https://formspree.io/f/YOUR_FORMSPREE_ID_HERE" method="POST">
          <input type="text" name="name" placeholder="Your Name" required>
          <input type="email" name="email" placeholder="Email Address" required>
          <textarea name="message" placeholder="Your Message" rows="5" required></textarea>
          <button type="submit" class="btn btn-primary" style="width: 100%; justify-content:center;">
            Send Message
          </button>
        </form>

        <div id="form-status" style="margin-top:15px; text-align:center; font-weight:500;"></div>
      </div>
    </section>

    <footer>
      <div class="social-links">
        <a href="#"><i data-lucide="github"></i></a>
        <a href="#"><i data-lucide="linkedin"></i></a>
        <a href="#"><i data-lucide="twitter"></i></a>
      </div>
      <p style="color: var(--text-dim); font-size: 0.8rem;">
        © 2026 Tshering Tenzing. Built with HTML & CSS
      </p>
    </footer>

    <script>
      lucide.createIcons();

      // === Email Form Functionality ===
      const form = document.getElementById('contactForm');
      const statusDiv = document.getElementById('form-status');

      form.addEventListener('submit', async (e) => {
        e.preventDefault();
        
        const button = form.querySelector('button');
        const originalText = button.textContent;

        button.textContent = "Sending...";
        button.disabled = true;
        statusDiv.textContent = "";

        try {
          const response = await fetch(form.action, {
            method: 'POST',
            body: new FormData(form),
            headers: { 'Accept': 'application/json' }
          });

          if (response.ok) {
            statusDiv.style.color = "#4ade80";
            statusDiv.textContent = "✅ Message sent successfully! Thank you.";
            form.reset();
          } else {
            throw new Error();
          }
        } catch (error) {
          statusDiv.style.color = "#f87171";
          statusDiv.textContent = "❌ Failed to send. Please try again.";
        }

        button.textContent = originalText;
        button.disabled = false;

        // Auto hide message after 6 seconds
        setTimeout(() => { statusDiv.textContent = ""; }, 6000);
      });
    </script>
</body>
</html>
