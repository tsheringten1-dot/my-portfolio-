<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portfolio | Tshering</title>
    <link href="https://cdn.jsdelivr.net/npm/remixicon@3.5.0/fonts/remixicon.css" rel="stylesheet">
    <style>
        :root {
            --primary: #6366f1;
            --secondary: #a855f7;
            --bg: #0f172a;
            --card-bg: rgba(30, 41, 59, 0.7);
            --text: #f8fafc;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', sans-serif;
        }

        body {
            background-color: var(--bg);
            color: var(--text);
            line-height: 1.6;
            scroll-behavior: smooth;
        }

        nav {
            position: fixed;
            top: 0;
            width: 100%;
            padding: 1.5rem 10%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: rgba(15, 23, 42, 0.9);
            backdrop-filter: blur(10px);
            z-index: 1000;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }

        .logo {
            font-size: 1.5rem;
            font-weight: 800;
            background: linear-gradient(to right, var(--primary), var(--secondary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .nav-links {
            display: flex;
            gap: 2rem;
            list-style: none;
        }

        .nav-links a {
            text-decoration: none;
            color: var(--text);
            transition: 0.3s;
        }

        .nav-links a:hover { color: var(--primary); }

        .hero {
            height: 100vh;
            display: flex;
            align-items: center;
            padding: 0 10%;
            background: radial-gradient(circle at 10% 20%, rgba(99, 102, 241, 0.1) 0%, transparent 50%);
        }

        .hero-content h1 { font-size: 3.5rem; margin-bottom: 1rem; }

        .btn {
            padding: 0.8rem 2rem;
            border-radius: 8px;
            text-decoration: none;
            font-weight: 600;
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            transition: 0.3s;
            cursor: pointer;
            border: none;
        }

        .btn-primary {
            background: var(--primary);
            color: white;
        }

        .btn-primary:hover {
            transform: translateY(-3px);
            box-shadow: 0 5px 15px rgba(99, 102, 241, 0.4);
        }

        .container { padding: 80px 10%; }

        .section-title { margin-bottom: 3rem; text-align: center; font-size: 2rem; }

        /* CONTACT FORM STYLING */
        .contact-form {
            max-width: 600px;
            margin: 0 auto;
            display: flex;
            flex-direction: column;
            gap: 1.2rem;
        }

        .contact-form input, 
        .contact-form textarea {
            width: 100%;
            padding: 1rem;
            background: var(--card-bg);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 8px;
            color: white;
            font-size: 1rem;
        }

        .contact-form input:focus, 
        .contact-form textarea:focus {
            outline: 2px solid var(--primary);
            border-color: transparent;
        }

        @media (max-width: 768px) {
            .hero-content h1 { font-size: 2.5rem; }
            .nav-links { display: none; }
        }
    </style>
</head>
<body>

    <nav>
        <div class="logo">TSHERING.</div>
        <ul class="nav-links">
            <li><a href="#home">Home</a></li>
            <li><a href="#tech">Skills</a></li>
            <li><a href="#contact">Contact</a></li>
        </ul>
    </nav>

    <section id="home" class="hero">
        <div class="hero-content">
            <h1>Hi, I'm <span style="color: var(--primary)">Tshering</span></h1>
            <p style="margin-bottom: 2rem; font-size: 1.2rem; color: #94a3b8;">Class 12 Student | C Programmer | Web Developer</p>
            <a href="#contact" class="btn btn-primary">Get In Touch</a>
        </div>
    </section>

    <section id="contact" class="container">
        <h2 class="section-title">Send Me a Message</h2>
        
        <!-- FORM LINKED TO FORMSPREE -->
        <form action="https://formspree.io/f/xvgzlowy" method="POST" class="contact-form">
            <input type="text" name="name" placeholder="Your Name" required>
            <input type="email" name="email" placeholder="Your Email Address" required>
            <textarea name="message" placeholder="How can I help you?" rows="5" required></textarea>
            
            <!-- Hidden field to prevent spam -->
            <input type="text" name="_gotcha" style="display:none">
            
            <button type="submit" class="btn btn-primary" style="justify-content: center;">
                Send Email <i class="ri-send-plane-fill"></i>
            </button>
        </form>
    </section>

    <footer style="text-align: center; padding: 3rem; opacity: 0.5;">
        &copy; 2026 Tshering. Created with Code.
    </footer>

</body>
</html>
